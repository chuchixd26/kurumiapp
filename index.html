<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KurumiApp Panel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0f0f13;
            --panel-bg: #1c1c24;
            --primary-color: #e62e4d;
            --text-color: #ffffff;
            --text-muted: #a0a0b0;
            --vip-color: #ffd700;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--primary-color);
            margin: 0 0 5px 0;
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #vip-badge {
            font-size: 14px;
            font-weight: bold;
            min-height: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background-color: var(--panel-bg);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(230, 46, 77, 0.1);
            transition: transform 0.2s;
        }

        .stat-card:active {
            transform: scale(0.95);
        }

        .stat-card.full-width {
            grid-column: span 2;
        }

        .stat-card h3 {
            margin: 0 0 10px 0;
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-card p {
            margin: 0;
            font-size: 20px;
            font-weight: bold;
            color: var(--text-color);
        }

        .harem-section h2 {
            font-size: 18px;
            color: var(--primary-color);
            border-bottom: 2px solid var(--panel-bg);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .harem-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
        }

        .waifu-card {
            background-color: var(--panel-bg);
            border-radius: 12px;
            padding: 15px 10px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .waifu-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .waifu-card p {
            margin: 0;
            font-size: 11px;
            font-weight: bold;
            color: var(--text-color);
            word-break: break-word;
        }

        .empty-harem {
            grid-column: 1 / -1;
            text-align: center;
            color: var(--text-muted);
            font-style: italic;
            padding: 20px;
            background-color: var(--panel-bg);
            border-radius: 12px;
        }
    </style>
</head>
<body>

    <header>
        <h1>KurumiApp 😈</h1>
        <div id="vip-badge"></div>
    </header>

    <div class="stats-grid">
        <div class="stat-card full-width">
            <h3>👑 Rango Actual</h3>
            <p id="titulo-display">Cargando...</p>
        </div>
        <div class="stat-card">
            <h3>💰 Monedas</h3>
            <p id="monedas-display">0</p>
        </div>
        <div class="stat-card">
            <h3>💖 Afinidad</h3>
            <p id="afinidad-display">0%</p>
        </div>
    </div>

    <section class="harem-section">
        <h2>📸 Tu Harem Privado</h2>
        <div id="harem-gallery" class="harem-gallery">
            </div>
    </section>

    <script>
        // 1. Expandimos la App para que ocupe toda la pantalla en Telegram
        window.Telegram.WebApp.expand();
        window.Telegram.WebApp.ready();

        // 2. Extraemos los parámetros de la URL enviados por bot.py
        const urlParams = new URLSearchParams(window.location.search);
        
        // Asignamos valores por defecto en caso de que algo llegue vacío
        const coins = urlParams.get('coins') || '0';
        const afinidad = urlParams.get('afinidad') || '0';
        const titulo = urlParams.get('titulo') ? decodeURIComponent(urlParams.get('titulo')) : 'Desconocido';
        const isVip = urlParams.get('vip') === '1';
        const waifusRaw = urlParams.get('waifus') ? decodeURIComponent(urlParams.get('waifus')) : '';

        // Convertimos el string separado por comas en un Array (lista)
        const waifusArray = waifusRaw ? waifusRaw.split(',') : [];

        // 3. Renderizamos la información en el HTML
        document.getElementById('monedas-display').innerText = parseInt(coins).toLocaleString();
        document.getElementById('afinidad-display').innerText = afinidad + '%';
        document.getElementById('titulo-display').innerText = titulo;

        // Mostrar Medalla VIP
        if (isVip) {
            const badge = document.getElementById('vip-badge');
            badge.innerText = "🌟 USUARIO PREMIUM";
            badge.style.color = "var(--vip-color)";
            badge.style.textShadow = "0 0 10px rgba(255, 215, 0, 0.5)";
        }

        // 4. Generar la Galería del Harem
        const haremContainer = document.getElementById('harem-gallery');
        
        if (waifusArray.length > 0) {
            waifusArray.forEach(waifu => {
                // Formatear nombre (ej: "tifa_lockhart" a "Tifa Lockhart")
                let nombreLimpio = waifu.replace(/_/g, ' ');
                // Poner la primera letra de cada palabra en mayúscula
                nombreLimpio = nombreLimpio.replace(/\b\w/g, l => l.toUpperCase());
                
                let tarjeta = document.createElement('div');
                tarjeta.className = "waifu-card";
                tarjeta.innerHTML = `
                    <div class="waifu-icon">💖</div>
                    <p>${nombreLimpio}</p>
                `;
                haremContainer.appendChild(tarjeta);
            });
        } else {
            // Mensaje si no tiene waifus
            haremContainer.innerHTML = `
                <div class="empty-harem">
                    Aún no tienes a nadie en tu Harem.<br>Usa el comando /gacha en el bot para empezar a coleccionar.
                </div>
            `;
        }
    </script>
</body>
</html>
