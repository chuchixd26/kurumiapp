<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Kurumi H-Panel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0b0014;
            --panel-bg: #160224;
            --accent: #ff007f;
            --accent-glow: rgba(255, 0, 127, 0.6);
            --text: #ffffff;
            --vip: #ffd700;
            --vip-glow: rgba(255, 215, 0, 0.6);
        }

        body {
            margin: 0;
            padding: 15px;
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden;
            padding-bottom: 40px;
        }

        header {
            text-align: center;
            padding: 15px 0;
            border-bottom: 2px solid var(--accent);
            margin-bottom: 20px;
            box-shadow: 0 5px 15px var(--accent-glow);
            border-radius: 0 0 20px 20px;
            background: linear-gradient(180deg, rgba(255,0,127,0.1) 0%, transparent 100%);
        }

        h1 { margin: 0; font-size: 24px; letter-spacing: 2px; color: var(--accent); text-shadow: 0 0 8px var(--accent-glow); }
        .auth-status { font-size: 12px; color: #a8a8a8; margin-top: 5px; font-style: italic; }
        #vip-badge { font-weight: bold; margin-top: 5px; font-size: 12px; height: 15px; }

        .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .card {
            background: var(--panel-bg); border: 1px solid rgba(255, 0, 127, 0.3); border-radius: 12px;
            padding: 15px; text-align: center; box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
        }
        .full { grid-column: span 2; }
        .label { display: block; font-size: 11px; color: var(--accent); text-transform: uppercase; font-weight: bold; margin-bottom: 8px; }
        .value { font-size: 22px; font-weight: 900; text-shadow: 0 0 5px rgba(255,255,255,0.3); }

        .progress-bg { background: #000; border-radius: 10px; height: 12px; width: 100%; margin-top: 10px; border: 1px solid rgba(255,0,127,0.3); overflow: hidden; }
        .progress-fill { background: linear-gradient(90deg, #ff007f, #ff4da6); height: 100%; width: 0%; transition: width 1s ease-in-out; box-shadow: 0 0 10px var(--accent-glow); }

        .promo-box {
            background: linear-gradient(135deg, #2a0800 0%, #1a0000 100%); border: 2px solid var(--vip);
            border-radius: 15px; padding: 20px; text-align: center; margin-bottom: 25px;
            box-shadow: 0 0 20px var(--vip-glow); animation: pulse 2s infinite;
        }
        .promo-box h3 { color: var(--vip); margin: 0 0 10px 0; font-size: 18px; text-shadow: 0 0 5px var(--vip-glow); }
        .promo-box ul { text-align: left; font-size: 13px; color: #ddd; padding-left: 20px; margin-bottom: 15px; line-height: 1.6; }
        .btn-buy { background: linear-gradient(90deg, #ffaa00, #ffea00); color: #000; border: none; padding: 12px 20px; border-radius: 8px; font-weight: 900; font-size: 14px; width: 100%; cursor: pointer; text-transform: uppercase; box-shadow: 0 0 15px rgba(255, 215, 0, 0.5); }
        .btn-buy:active { transform: scale(0.95); }

        .harem-title { font-size: 16px; color: var(--accent); margin: 0 0 15px 0; text-transform: uppercase; font-weight: bold; border-bottom: 1px solid var(--accent); padding-bottom: 5px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 10px; }
        .waifu-item { background: #230235; border-radius: 10px; padding: 10px 5px; text-align: center; border: 1px solid rgba(255, 0, 127, 0.2); transition: all 0.2s; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 110px;}
        .waifu-item:active { background: var(--accent); transform: scale(0.95); }
        .waifu-item span { font-size: 10px; font-weight: bold; display: block; margin-top: 8px; }
        .emoji { font-size: 28px; }

        @keyframes pulse { 0% { box-shadow: 0 0 10px var(--vip-glow); } 50% { box-shadow: 0 0 25px var(--vip-glow); } 100% { box-shadow: 0 0 10px var(--vip-glow); } }
    </style>
</head>
<body>

    <header>
        <h1>KURUMI H-PANEL 😈</h1>
        <div class="auth-status" id="auth-status">Verificando credenciales...</div>
        <div id="vip-badge"></div>
    </header>

    <div class="stats-container">
        <div class="card full">
            <span class="label">👑 Estatus en la Sociedad</span>
            <div class="value" id="titulo">Cargando...</div>
        </div>
        <div class="card">
            <span class="label">💰 Capital Lewd</span>
            <div class="value" id="monedas">0</div>
        </div>
        <div class="card">
            <span class="label">🌡️ Excitación</span>
            <div class="value" id="afinidad-text">0%</div>
            <div class="progress-bg">
                <div class="progress-fill" id="afinidad-bar"></div>
            </div>
        </div>
    </div>

    <div id="promo-container"></div>

    <div class="harem-title">📸 Tu Colección Privada</div>
    <div id="gallery" class="gallery"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // 1. LOGIN NATIVO DE TELEGRAM
        const user = tg.initDataUnsafe?.user;
        const authStatus = document.getElementById('auth-status');
        if (user) {
            authStatus.innerText = `🟢 Autenticado como: ${user.first_name}`;
            authStatus.style.color = "#00ffcc";
        } else {
            authStatus.innerText = `🔴 Sesión Anónima`;
            authStatus.style.color = "#ff3333";
        }

        // 2. EXTRACTOR DE DATOS
        const params = new URLSearchParams(window.location.search);
        const coins = params.get('money') || '0';
        const afinidad = parseInt(params.get('love')) || 0;
        const titulo = params.get('rank') ? decodeURIComponent(params.get('rank')) : 'Solitario';
        const isVip = params.get('isvip') === '1';
        const waifusRaw = params.get('waifus') ? decodeURIComponent(params.get('waifus')) : '';

        // 3. RENDERIZAR ESTADÍSTICAS
        document.getElementById('monedas').innerText = parseInt(coins).toLocaleString();
        document.getElementById('titulo').innerText = titulo;
        
        document.getElementById('afinidad-text').innerText = afinidad + '%';
        setTimeout(() => { document.getElementById('afinidad-bar').style.width = afinidad + '%'; }, 300);

        const promoContainer = document.getElementById('promo-container');
        if (isVip) {
            document.getElementById('vip-badge').innerText = "✦ MIEMBRO VIP ACTIVO 🔞 ✦";
            document.getElementById('vip-badge').style.color = "var(--vip)";
            promoContainer.innerHTML = `
                <div class="promo-box" style="animation: none; border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow);">
                    <h3 style="color: var(--accent);">💖 Gracias por tu devoción</h3>
                    <p style="font-size: 13px; color: #ccc;">Disfruta del modo sin censura y los privilegios de IA infinita.</p>
                </div>
            `;
        } else {
            promoContainer.innerHTML = `
                <div class="promo-box">
                    <h3>⭐ DESBLOQUEA EL MODO VIP ⭐</h3>
                    <ul>
                        <li>🔞 <b>Modo Sin Censura:</b> Etiquetas premium liberadas.</li>
                        <li>🧠 <b>IA Infinita:</b> Chatea sin límites diarios.</li>
                        <li>👑 <b>Prestigio:</b> Rango VIP permanente.</li>
                    </ul>
                    <button class="btn-buy" onclick="comprarVip()">PAGAR CON TELEGRAM STARS ⭐️</button>
                </div>
            `;
        }

        function comprarVip() {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');
            tg.showAlert("Serás redirigido al chat para procesar tu pago. 😈", function() {
                tg.sendData("/comprarvip"); 
                tg.close();
            });
        }

        // 4. CARGAR LAS IMÁGENES DE GELBOORU (Autenticado y Blindado)
        const gallery = document.getElementById('gallery');
        const waifusList = waifusRaw ? waifusRaw.split(',') : [];

        // --- TUS LLAVES DE GELBOORU INTEGRADAS ---
        const gelUserId = "1938514";  
        const gelApiKey = "1fc105441540d4f615ca8f00e66b3980129de3c3506fe498f7cedfcebdc21dfe890ceb1baf88c1788f47912a75339a59d4af10984848999aec3d72aed7665348";  
        // ------------------------------

        if (waifusList.length > 0 && waifusList[0] !== "") {
            waifusList.forEach(w => {
                let searchTag = w.trim().toLowerCase();
                let name = w.replace(/_/g, ' ').toUpperCase();
                
                let div = document.createElement('div');
                div.className = 'waifu-item';
                div.innerHTML = `<div class="emoji" style="font-size:18px;">⏳</div><span>${name}</span>`;
                gallery.appendChild(div);
                
                // Armamos la URL de Gelbooru AUTENTICADA
                let apiUrl = `https://gelbooru.com/index.php?page=dapi&s=post&q=index&json=1&limit=1&tags=${searchTag}+rating:explicit`;
                apiUrl += `&user_id=${gelUserId}&api_key=${gelApiKey}`;

                // Conectamos con Gelbooru usando tus credenciales
                fetch(apiUrl)
                    .then(response => response.json())
                    .then(data => {
                        if (data.post && data.post.length > 0) {
                            let imgUrl = data.post[0].preview_url || data.post[0].file_url;
                            div.innerHTML = `<img src="${imgUrl}" style="width: 100%; height: 80px; object-fit: cover; border-radius: 8px; border: 1px solid rgba(255, 0, 127, 0.4);"><span>${name}</span>`;
                        } else {
                            div.innerHTML = `<div class="emoji">⛓️</div><span>${name}</span>`;
                        }
                    })
                    .catch(err => {
                        div.innerHTML = `<div class="emoji">⛓️</div><span>${name}</span>`;
                    });
                
                div.onclick = () => {
                    if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                    tg.showPopup({ title: name, message: `Tienes a ${name} en tu colección. 😈`, buttons: [{type: "close"}] });
                };
            });
        } else {
            gallery.innerHTML = '<div style="grid-column: span 4; text-align: center; color: #666; font-style: italic; padding: 20px;">Tu colección está vacía... usa /gacha para expandirla.</div>';
        }
    </script>
</body>
</html>
